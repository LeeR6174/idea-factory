name: Issue Agent Workflow

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-issue-pr:
    runs-on: ubuntu-latest
    env:
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Antigravity Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/agent.py

      - name: Commit and Create Pull Request
        run: |
          # Gitの設定
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ブランチの作成と切り替え
          BRANCH_NAME="issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH_NAME"
          
          # 変更を追加
          git add -A
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "feat: implement solution for issue #${ISSUE_NUMBER} by Antigravity Agent"
          
          # リモートへのプッシュ
          git push origin "$BRANCH_NAME"
          
          # GitHub CLIによるPR作成
          gh pr create \
            --title "feat: resolve issue #${ISSUE_NUMBER}" \
            --body "This PR was automatically generated by the Antigravity Agent to resolve issue #${ISSUE_NUMBER}." \
            --head "$BRANCH_NAME" \
            --base main