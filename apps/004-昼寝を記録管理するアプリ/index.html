<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>昼寝タイマー & ログ - Idea Factory</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.05);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.3);
      --primary: #38bdf8;
      --gradient-accent: linear-gradient(135deg, #f97316, #facc15);
      --gradient-primary: linear-gradient(135deg, #38bdf8, #818cf8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: white;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Timer Section styling */
    .timer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring__circle {
      transition: stroke-dashoffset 0.35s;
      transform-origin: 50% 50%;
    }

    .timer-display {
      position: absolute;
      font-size: 2.75rem;
      font-weight: 700;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.25rem;
    }

    .timer-presets {
      display: flex;
      gap: 0.75rem;
      margin: 2rem 0;
      width: 100%;
      justify-content: center;
    }

    .preset-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      color: white;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .preset-btn:hover, .preset-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .timer-controls {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 0.9rem;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--gradient-accent);
      color: white;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Logging Form styling */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    select, input, textarea {
      width: 100%;
      padding: 0.85rem;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      transition: border-color 0.2s ease;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .rating-container {
      display: flex;
      gap: 0.5rem;
    }

    .star {
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.15s ease;
    }

    .star.selected {
      color: #fbbf24;
    }

    /* Logs List and Graphs styling */
    .logs-section {
      grid-column: 1 / -1;
      margin-top: 2rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      padding: 0.5rem 1.2rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      position: relative;
    }

    .tab-btn.active {
      color: white;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .log-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .log-info h4 {
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .log-info p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .log-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #ef4444;
      cursor: pointer;
      padding: 0.25rem;
      transition: opacity 0.2s ease;
    }

    .delete-btn:hover {
      opacity: 0.8;
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <header>
      <a href="../../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>ダッシュボードに戻る</span>
      </a>
      <h1>昼寝タイマー & ログ</h1>
    </header>

    <div class="grid">
      
      <!-- Timer Card -->
      <div class="card">
        <h3 class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          昼寝タイマー
        </h3>
        
        <div class="timer-container">
          <svg class="progress-ring" width="220" height="220">
            <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.03)" stroke-width="8" fill="transparent" r="96" cx="110" cy="110"/>
            <circle id="timer-progress" class="progress-ring__circle" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" fill="transparent" r="96" cx="110" cy="110"/>
          </svg>
          <div class="timer-display">
            <span id="time-left">20:00</span>
            <span class="timer-label" id="timer-state">Ready</span>
          </div>
        </div>

        <div class="timer-presets">
          <button class="preset-btn" data-time="900">15分</button>
          <button class="preset-btn active" data-time="1200">20分</button>
          <button class="preset-btn" data-time="1800">30分</button>
          <button class="preset-btn" data-time="10">テスト (10秒)</button>
        </div>

        <div class="timer-controls">
          <button class="btn btn-primary" id="start-btn">スタート</button>
          <button class="btn btn-secondary" id="reset-btn">リセット</button>
        </div>
      </div>

      <!-- Log Form Card -->
      <div class="card">
        <h3 class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>
          昼寝を記録する
        </h3>
        
        <form id="nap-form">
          <div class="form-group">
            <label for="nap-duration">昼寝時間 (分)</label>
            <input type="number" id="nap-duration" value="20" min="1" required>
          </div>
          
          <div class="form-group">
            <label for="nap-location">場所</label>
            <select id="nap-location">
              <option value="bed">ベッド</option>
              <option value="sofa">ソファ</option>
              <option value="desk">机・デスク</option>
              <option value="floor">床/コタツ</option>
              <option value="other">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label>すっきり度</label>
            <div class="rating-container" id="rating-stars">
              <span class="star selected" data-value="1">★</span>
              <span class="star selected" data-value="2">★</span>
              <span class="star selected" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
          </div>

          <div class="form-group">
            <label for="nap-notes">メモ（起きた時の感想など）</label>
            <textarea id="nap-notes" rows="2" placeholder="例：コーヒーを飲んでから寝たのですっきり起きられた。"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">記録を保存</button>
        </form>
      </div>

      <!-- Historical Logs & Graphs -->
      <div class="card logs-section">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-list">過去のログ</button>
          <button class="tab-btn" data-tab="tab-charts">統計グラフ</button>
        </div>

        <!-- Logs List Tab -->
        <div class="tab-content active" id="tab-list">
          <div class="log-list" id="log-list-container">
            <!-- Dynamically Loaded -->
          </div>
        </div>

        <!-- Charts Tab -->
        <div class="tab-content" id="tab-charts">
          <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
            <div>
              <h4 style="margin-bottom: 0.5rem; text-align: center;">場所別の割合</h4>
              <div class="chart-container">
                <canvas id="locationChart"></canvas>
              </div>
            </div>
            <div>
              <h4 style="margin-bottom: 0.5rem; text-align: center;">日別の平均すっきり度</h4>
              <div class="chart-container">
                <canvas id="ratingChart"></canvas>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Audio file for completion -->
  <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-120.wav" preload="auto"></audio>

  <script>
    // State management
    let timerInterval = null;
    let totalSeconds = 1200; // default 20 min
    let secondsLeft = 1200;
    let timerRunning = false;
    let selectedRating = 3;

    // Progress Ring setup
    const circle = document.getElementById('timer-progress');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = 0;

    function setProgress(percent) {
      const offset = circumference - (percent / 100 * circumference);
      circle.style.strokeDashoffset = offset;
    }

    // Timer Logic
    const timeLeftDisplay = document.getElementById('time-left');
    const timerState = document.getElementById('timer-state');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const alarmSound = document.getElementById('alarm-sound');

    function updateTimerDisplay() {
      const mins = Math.floor(secondsLeft / 60);
      const secs = secondsLeft % 60;
      timeLeftDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      setProgress((secondsLeft / totalSeconds) * 100);
    }

    function startTimer() {
      if (timerRunning) {
        clearInterval(timerInterval);
        timerState.textContent = 'PAUSED';
        startBtn.textContent = 'スタート';
        timerRunning = false;
      } else {
        timerState.textContent = 'NAPPING';
        startBtn.textContent = '一時停止';
        timerRunning = true;
        timerInterval = setInterval(() => {
          secondsLeft--;
          updateTimerDisplay();
          
          if (secondsLeft <= 0) {
            clearInterval(timerInterval);
            timerFinished();
          }
        }, 1000);
      }
    }

    function timerFinished() {
      timerState.textContent = 'DONE!';
      startBtn.textContent = 'スタート';
      timerRunning = false;
      setProgress(0);
      
      // Sound alert
      alarmSound.play();

      // Vibration alert
      if ('vibrate' in navigator) {
        navigator.vibrate([300, 150, 300, 150, 300]);
      }
      
      // Open modal/auto-populate logging form
      const minsTaken = Math.round(totalSeconds / 60);
      document.getElementById('nap-duration').value = minsTaken;
      alert('昼寝時間が終了しました！記録を保存してください。');
    }

    function resetTimer() {
      clearInterval(timerInterval);
      secondsLeft = totalSeconds;
      timerRunning = false;
      timerState.textContent = 'READY';
      startBtn.textContent = 'スタート';
      updateTimerDisplay();
    }

    // Presets
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        totalSeconds = parseInt(btn.dataset.time);
        resetTimer();
      });
    });

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);

    // Star Rating
    const stars = document.querySelectorAll('#rating-stars .star');
    stars.forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.value);
        stars.forEach(s => {
          if (parseInt(s.dataset.value) <= selectedRating) {
            s.classList.add('selected');
          } else {
            s.classList.remove('selected');
          }
        });
      });
    });

    // CRUD Logs (LocalStorage)
    const logsContainer = document.getElementById('log-list-container');
    const napForm = document.getElementById('nap-form');
    let locationChart = null;
    let ratingChart = null;

    function getLogs() {
      return JSON.parse(localStorage.getItem('nap_logs') || '[]');
    }

    function saveLogs(logs) {
      localStorage.setItem('nap_logs', JSON.stringify(logs));
    }

    function renderLogs() {
      const logs = getLogs();
      logsContainer.innerHTML = '';
      
      if (logs.length === 0) {
        logsContainer.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 2rem;">記録された昼寝ログはありません。</div>`;
        return;
      }

      logs.forEach((log, index) => {
        const item = document.createElement('div');
        item.className = 'log-item';
        
        const starsHtml = '★'.repeat(log.rating) + '☆'.repeat(5 - log.rating);
        const dateStr = new Date(log.date).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        item.innerHTML = `
          <div class="log-info">
            <h4>${log.duration}分間の睡眠 (${log.locationName})</h4>
            <p>${dateStr} | すっきり度: <span style="color: #fbbf24">${starsHtml}</span></p>
            ${log.notes ? `<p style="margin-top: 0.25rem; font-style: italic; color: #cbd5e1;">"${log.notes}"</p>` : ''}
          </div>
          <div class="log-meta">
            <button class="delete-btn" onclick="deleteLog(${index})">削除</button>
          </div>
        `;
        logsContainer.appendChild(item);
      });
    }

    window.deleteLog = function(index) {
      if (confirm('この記録を削除しますか？')) {
        const logs = getLogs();
        logs.splice(index, 1);
        saveLogs(logs);
        renderLogs();
        initCharts();
      }
    };

    napForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const duration = parseInt(document.getElementById('nap-duration').value);
      const location = document.getElementById('nap-location').value;
      const locationSelect = document.getElementById('nap-location');
      const locationName = locationSelect.options[locationSelect.selectedIndex].text;
      const notes = document.getElementById('nap-notes').value;

      const newLog = {
        date: new Date().toISOString(),
        duration,
        location,
        locationName,
        rating: selectedRating,
        notes
      };

      const logs = getLogs();
      logs.unshift(newLog);
      saveLogs(logs);
      
      // Reset form
      document.getElementById('nap-notes').value = '';
      renderLogs();
      initCharts();
      
      alert('昼寝記録を保存しました！');
    });

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
        
        if (btn.dataset.tab === 'tab-charts') {
          initCharts();
        }
      });
    });

    // Charts Visualization
    function initCharts() {
      const logs = getLogs();
      if (logs.length === 0) return;

      // Location pie chart data
      const locations = {};
      logs.forEach(log => {
        locations[log.locationName] = (locations[log.locationName] || 0) + 1;
      });

      // Rating history line chart data (last 7 logs)
      const recentLogs = [...logs].reverse().slice(-7);
      const ratingLabels = recentLogs.map(log => new Date(log.date).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }));
      const ratingData = recentLogs.map(log => log.rating);

      // Location Chart
      if (locationChart) locationChart.destroy();
      const ctxLoc = document.getElementById('locationChart').getContext('2d');
      locationChart = new Chart(ctxLoc, {
        type: 'doughnut',
        data: {
          labels: Object.keys(locations),
          datasets: [{
            data: Object.values(locations),
            backgroundColor: ['#f97316', '#38bdf8', '#a855f7', '#4ade80', '#fb7185'],
            borderWidth: 1,
            borderColor: 'rgba(255,255,255,0.05)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#94a3b8' }
            }
          }
        }
      });

      // Rating Chart
      if (ratingChart) ratingChart.destroy();
      const ctxRate = document.getElementById('ratingChart').getContext('2d');
      ratingChart = new Chart(ctxRate, {
        type: 'line',
        data: {
          labels: ratingLabels,
          datasets: [{
            label: 'すっきり度',
            data: ratingData,
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56, 189, 248, 0.1)',
            borderWidth: 2,
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              min: 1,
              max: 5,
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#94a3b8', stepSize: 1 }
            },
            x: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#94a3b8' }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    // Initialize
    resetTimer();
    renderLogs();
  </script>
</body>
</html>
