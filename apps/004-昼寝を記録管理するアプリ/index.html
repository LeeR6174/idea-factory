<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>昼寝タイマー & ログ - Idea Factory</title>
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0066cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="昼寝タイマー">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Google Fonts (Inter substitute for SF Pro) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* Apple Design Tokens */
    :root {
      --primary: #0066cc; /* Action Blue */
      --primary-focus: #0071e3;
      --ink: #1d1d1f; /* Near-Black Ink */
      --body: #1d1d1f;
      --body-muted: #86868b;
      --canvas: #ffffff; /* Pure White */
      --canvas-parchment: #f5f5f7; /* Parchment off-white */
      --surface-pearl: #fafafc;
      --hairline: #d2d2d7;
      --hairline-soft: #e5e5e7;
      
      --rounded-sm: 8px;
      --rounded-md: 11px;
      --rounded-lg: 18px;
      --rounded-pill: 9999px;
      
      --font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--canvas-parchment);
      color: var(--body);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* Sub Navigation / Header (Frosted Parchment, 52px) */
    .sub-nav {
      background-color: rgba(245, 245, 247, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--hairline-soft);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 99;
      margin-bottom: 48px;
    }

    .sub-nav-container {
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px;
    }

    .back-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: text-decoration 0.2s ease;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .sub-nav-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--ink);
    }

    .main-container {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 0 22px;
    }

    /* Layout Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Store Utility Card Style (White, rounded 18px, no shadows) */
    .card {
      background-color: var(--canvas);
      border: 1px solid var(--hairline-soft);
      border-radius: var(--rounded-lg);
      padding: 32px 24px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Timer Container */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 12px;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring__circle {
      transition: stroke-dashoffset 0.35s;
      transform-origin: 50% 50%;
    }

    .timer-display {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .time-left {
      font-size: 44px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }

    .timer-state {
      font-size: 12px;
      font-weight: 600;
      color: var(--body-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    /* Timer Presets */
    .timer-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 24px 0;
      justify-content: center;
    }

    .preset-btn {
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 400;
      color: var(--body);
      background-color: var(--canvas-parchment);
      border: 1px solid var(--hairline-soft);
      border-radius: var(--rounded-pill);
      cursor: pointer;
      transition: all 0.2s ease, transform 0.1s ease;
    }

    .preset-btn:hover {
      background-color: #e8e8ed;
    }

    .preset-btn.active {
      background-color: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
    }

    .preset-btn:active {
      transform: scale(0.97);
    }

    /* Button Layout */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease, transform 0.1s ease;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #ffffff;
      border-radius: var(--rounded-pill);
    }

    .btn-primary:hover {
      background-color: var(--primary-focus);
    }

    .btn-secondary {
      background-color: var(--surface-pearl);
      border: 1px solid var(--hairline);
      color: var(--primary);
      border-radius: var(--rounded-pill);
    }

    .btn-secondary:hover {
      background-color: var(--canvas-parchment);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* Forms & Inputs (Apple Style, rounded-sm 8px) */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--body-muted);
      margin-bottom: 6px;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px 14px;
      background-color: var(--canvas-parchment);
      border: 1px solid var(--hairline-soft);
      border-radius: var(--rounded-sm);
      color: var(--ink);
      font-size: 14px;
      font-family: var(--font-family);
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background-color: var(--canvas);
    }

    /* Star Rating */
    .rating-container {
      display: flex;
      gap: 4px;
    }

    .star {
      font-size: 20px;
      cursor: pointer;
      color: #d2d2d7;
      transition: color 0.15s ease;
    }

    .star.selected {
      color: #ff9500; /* Apple Gold/Orange */
    }

    /* Logs & Statistics Section */
    .logs-container {
      grid-column: 1 / -1;
      margin-top: 16px;
    }

    /* Tabs (Apple sub-nav item styling) */
    .tabs {
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--hairline-soft);
      margin-bottom: 24px;
      padding-bottom: 8px;
    }

    .tab-btn {
      padding: 6px 0;
      background: transparent;
      border: none;
      color: var(--body-muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--ink);
    }

    .tab-btn.active {
      color: var(--primary);
      font-weight: 600;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: var(--primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Log List */
    .log-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--hairline-soft);
    }

    .log-item:last-child {
      border-bottom: none;
    }

    .log-info h4 {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .log-info p {
      font-size: 12px;
      color: var(--body-muted);
      line-height: 1.4;
    }

    .log-meta {
      display: flex;
      align-items: center;
    }

    /* Danger / Delete text link */
    .delete-link {
      color: #ff3b30; /* Apple Red */
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .delete-link:hover {
      text-decoration: underline;
    }

    /* Charts Layout */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    @media (max-width: 768px) {
      .charts-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    .chart-container {
      position: relative;
      height: 260px;
      width: 100%;
    }

    /* Vibration & Notification status panel */
    .status-panel {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--hairline-soft);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .status-row-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .status-label-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--body-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: var(--rounded-sm);
      text-transform: uppercase;
    }

    .status-badge.supported {
      background-color: rgba(76, 217, 100, 0.1);
      color: #4cd964;
    }

    .status-badge.unsupported {
      background-color: rgba(255, 59, 48, 0.1);
      color: #ff3b30;
    }

    .status-btn {
      margin: 0;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: var(--rounded-pill);
      background-color: var(--canvas-parchment);
      border: 1px solid var(--hairline-soft);
      color: var(--body);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .status-btn:hover {
      background-color: #e8e8ed;
    }

    .status-btn:active {
      transform: scale(0.95);
    }

    /* Modal Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Modal Card */
    .modal-card {
      background-color: var(--canvas);
      border: 1px solid var(--hairline-soft);
      border-radius: var(--rounded-lg);
      max-width: 90%;
      width: 320px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-emoji {
      font-size: 48px;
      margin-bottom: 16px;
      display: inline-block;
      animation: pulse-emoji 2s infinite ease-in-out;
    }

    @keyframes pulse-emoji {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>
</head>
<body>

  <!-- Sub Navigation Header -->
  <nav class="sub-nav">
    <div class="sub-nav-container">
      <a href="../../index.html" class="back-link">
        <svg width="6" height="10" viewBox="0 0 9 10" fill="none" style="transform: scaleX(-1);"><path d="M2.5 1.5L6 5L2.5 8.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>ダッシュボード</span>
      </a>
      <span class="sub-nav-title">昼寝タイマー & ログ</span>
      <div></div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="main-container">
    <div class="grid">
      
      <!-- Timer Card -->
      <div class="card">
        <h3 class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          昼寝タイマー
        </h3>
        
        <div class="timer-section">
          <svg class="progress-ring" width="200" height="200">
            <circle class="progress-ring__circle-bg" stroke="var(--canvas-parchment)" stroke-width="6" fill="transparent" r="88" cx="100" cy="100"/>
            <circle id="timer-progress" class="progress-ring__circle" stroke="var(--primary)" stroke-width="6" stroke-linecap="round" fill="transparent" r="88" cx="100" cy="100"/>
          </svg>
          <div class="timer-display">
            <span class="time-left" id="time-left">20:00</span>
            <span class="timer-state" id="timer-state">Ready</span>
          </div>
        </div>

        <div class="timer-presets">
          <button class="preset-btn" data-time="900">15分</button>
          <button class="preset-btn active" data-time="1200">20分</button>
          <button class="preset-btn" data-time="1800">30分</button>
          <button class="preset-btn" data-time="10">テスト (10秒)</button>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="start-btn">スタート</button>
          <button class="btn btn-secondary" id="reset-btn">リセット</button>
        </div>

        <!-- Vibration & Notification Settings Panel -->
        <div class="status-panel">
          <div class="status-row-item">
            <span class="status-label-text">
              <span>📳</span> バイブレーション: <span id="vibrate-badge" class="status-badge">判定中...</span>
            </span>
            <button class="status-btn" id="test-vibrate-btn" type="button">テスト</button>
          </div>
          <div class="status-row-item">
            <span class="status-label-text">
              <span>🔔</span> バックグラウンド通知: <span id="notification-badge" class="status-badge">判定中...</span>
            </span>
            <button class="status-btn" id="enable-notification-btn" type="button" style="display: none;">許可する</button>
          </div>
        </div>
      </div>

      <!-- Log Form Card -->
      <div class="card">
        <h3 class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>
          昼寝を記録する
        </h3>
        
        <form id="nap-form">
          <div class="form-group">
            <label for="nap-duration">昼寝時間 (分)</label>
            <input type="number" id="nap-duration" value="20" min="1" required>
          </div>
          
          <div class="form-group">
            <label for="nap-location">場所</label>
            <select id="nap-location">
              <option value="bed">ベッド</option>
              <option value="sofa">ソファ</option>
              <option value="desk">デスク・机</option>
              <option value="floor">床・コタツ</option>
              <option value="other">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label>すっきり度</label>
            <div class="rating-container" id="rating-stars">
              <span class="star selected" data-value="1">★</span>
              <span class="star selected" data-value="2">★</span>
              <span class="star selected" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
          </div>

          <div class="form-group">
            <label for="nap-notes">メモ（起きた時の感想など）</label>
            <textarea id="nap-notes" rows="2" placeholder="例：コーヒーを飲んでから寝たのですっきり起きられた。"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">記録を保存</button>
        </form>
      </div>

      <!-- Logs / Charts Card -->
      <div class="card logs-container">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-list">過去のログ</button>
          <button class="tab-btn" data-tab="tab-charts">統計グラフ</button>
        </div>

        <!-- Tab 1: Logs List -->
        <div class="tab-content active" id="tab-list">
          <div class="log-list" id="log-list-container">
            <!-- Dynamically populated -->
          </div>
        </div>

        <!-- Tab 2: Charts -->
        <div class="tab-content" id="tab-charts">
          <div class="charts-grid">
            <div>
              <h4 style="font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 16px; color: var(--ink);">場所別の割合</h4>
              <div class="chart-container">
                <canvas id="locationChart"></canvas>
              </div>
            </div>
            <div>
              <h4 style="font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 16px; color: var(--ink);">日別のすっきり度推移</h4>
              <div class="chart-container">
                <canvas id="ratingChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Sound alert on complete -->
  <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-120.wav" preload="auto"></audio>

  <script>
    // State management
    let timerInterval = null;
    let alarmInterval = null;
    let totalSeconds = 1200; // default 20 min
    let secondsLeft = 1200;
    let timerRunning = false;
    let selectedRating = 3;

    // Progress Ring setup
    const circle = document.getElementById('timer-progress');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = 0;

    function setProgress(percent) {
      const offset = circumference - (percent / 100 * circumference);
      circle.style.strokeDashoffset = offset;
    }

    // Timer UI references
    const timeLeftDisplay = document.getElementById('time-left');
    const timerState = document.getElementById('timer-state');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const alarmSound = document.getElementById('alarm-sound');

    function updateTimerDisplay() {
      const mins = Math.floor(secondsLeft / 60);
      const secs = secondsLeft % 60;
      timeLeftDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      setProgress((secondsLeft / totalSeconds) * 100);
    }

    function startTimer() {
      if (timerRunning) {
        clearInterval(timerInterval);
        timerState.textContent = 'PAUSED';
        startBtn.textContent = 'スタート';
        timerRunning = false;
      } else {
        timerState.textContent = 'NAPPING';
        startBtn.textContent = '一時停止';
        timerRunning = true;
        timerInterval = setInterval(() => {
          secondsLeft--;
          updateTimerDisplay();
          
          if (secondsLeft <= 0) {
            clearInterval(timerInterval);
            timerFinished();
          }
        }, 1000);
      }
    }

    // Alarm sound & Vibration loop
    function playAlarmAndVibrate() {
      stopAlarmAndVibrate();

      alarmSound.currentTime = 0;
      alarmSound.play().catch(err => console.log('Audio play failed:', err));

      if ('vibrate' in navigator) {
        navigator.vibrate([400, 200, 400, 200, 400]);
      }

      alarmInterval = setInterval(() => {
        alarmSound.currentTime = 0;
        alarmSound.play().catch(err => console.log('Audio play failed:', err));

        if ('vibrate' in navigator) {
          navigator.vibrate([400, 200, 400, 200, 400]);
        }
      }, 3000);
    }

    function stopAlarmAndVibrate() {
      if (alarmInterval) {
        clearInterval(alarmInterval);
        alarmInterval = null;
      }
      alarmSound.pause();
      alarmSound.currentTime = 0;
      if ('vibrate' in navigator) {
        navigator.vibrate(0);
      }
    }

    // Modal UI references & display logic
    const modal = document.getElementById('completion-modal');
    const modalContent = modal.querySelector('.modal-card');
    const modalSaveBtn = document.getElementById('modal-save-btn');
    const modalCloseBtn = document.getElementById('modal-close-btn');
    let modalSelectedRating = 3;

    // Handle modal rating stars interaction
    const modalStars = document.querySelectorAll('#modal-rating-stars .star');
    modalStars.forEach(star => {
      star.addEventListener('click', () => {
        modalSelectedRating = parseInt(star.dataset.value);
        modalStars.forEach(s => {
          if (parseInt(s.dataset.value) <= modalSelectedRating) {
            s.classList.add('selected');
          } else {
            s.classList.remove('selected');
          }
        });
      });
    });

    function showCompletionModal() {
      // Reset modal defaults
      modalSelectedRating = 3;
      modalStars.forEach(s => {
        if (parseInt(s.dataset.value) <= 3) {
          s.classList.add('selected');
        } else {
          s.classList.remove('selected');
        }
      });
      document.getElementById('modal-nap-location').value = 'desk';
      document.getElementById('modal-nap-notes').value = '';

      modal.style.display = 'flex';
      modal.offsetHeight; // force layout reflow
      modal.style.opacity = '1';
      modalContent.style.transform = 'scale(1)';
    }

    function hideCompletionModal() {
      modal.style.opacity = '0';
      modalContent.style.transform = 'scale(0.9)';
      setTimeout(() => {
        modal.style.display = 'none';
      }, 300);
    }

    modalSaveBtn.addEventListener('click', () => {
      stopAlarmAndVibrate();
      hideCompletionModal();
      
      const duration = Math.round(totalSeconds / 60);
      const location = document.getElementById('modal-nap-location').value;
      const locationSelect = document.getElementById('modal-nap-location');
      const locationName = locationSelect.options[locationSelect.selectedIndex].text;
      const notes = document.getElementById('modal-nap-notes').value;

      const newLog = {
        date: new Date().toISOString(),
        duration,
        location,
        locationName,
        rating: modalSelectedRating,
        notes
      };

      const logs = getLogs();
      logs.unshift(newLog);
      saveLogs(logs);
      
      renderLogs();
      initCharts();
      
      alert('昼寝記録を保存しました。');
    });

    modalCloseBtn.addEventListener('click', () => {
      stopAlarmAndVibrate();
      hideCompletionModal();
    });

    // Background notifications logic
    function showBackgroundNotification(title, body) {
      if ('serviceWorker' in navigator && Notification.permission === 'granted') {
        navigator.serviceWorker.ready.then(registration => {
          registration.showNotification(title, {
            body: body,
            icon: 'icon-192.png',
            vibrate: [300, 100, 300, 100, 300],
            tag: 'siesta-nap-timer',
            renotify: true
          });
        });
      }
    }

    // Vibration & Notification status panel UI
    const vibrateBadge = document.getElementById('vibrate-badge');
    const notificationBadge = document.getElementById('notification-badge');
    const testVibrateBtn = document.getElementById('test-vibrate-btn');
    const enableNotificationBtn = document.getElementById('enable-notification-btn');

    function initStatusPanel() {
      if ('vibrate' in navigator) {
        vibrateBadge.textContent = '対応';
        vibrateBadge.className = 'status-badge supported';
      } else {
        vibrateBadge.textContent = '非対応';
        vibrateBadge.className = 'status-badge unsupported';
      }
      updateNotificationStatus();
    }

    function updateNotificationStatus() {
      if (!('Notification' in window)) {
        notificationBadge.textContent = '非対応';
        notificationBadge.className = 'status-badge unsupported';
        enableNotificationBtn.style.display = 'none';
        return;
      }

      if (Notification.permission === 'granted') {
        notificationBadge.textContent = '許可済';
        notificationBadge.className = 'status-badge supported';
        enableNotificationBtn.style.display = 'none';
      } else if (Notification.permission === 'denied') {
        notificationBadge.textContent = '拒否';
        notificationBadge.className = 'status-badge unsupported';
        enableNotificationBtn.style.display = 'none';
      } else {
        notificationBadge.textContent = '未許可';
        notificationBadge.className = 'status-badge unsupported';
        enableNotificationBtn.style.display = 'inline-block';
      }
    }

    testVibrateBtn.addEventListener('click', () => {
      if ('vibrate' in navigator) {
        navigator.vibrate([200, 100, 200]);
        testVibrateBtn.textContent = '振動中...';
        setTimeout(() => {
          testVibrateBtn.textContent = 'テスト';
        }, 1000);
      } else {
        alert('このデバイス/ブラウザはバイブレーション機能に対応していません。');
      }
    });

    enableNotificationBtn.addEventListener('click', () => {
      Notification.requestPermission().then(permission => {
        updateNotificationStatus();
        if (permission === 'granted') {
          showBackgroundNotification('通知が許可されました', '昼寝タイマー終了時にこの通知でお知らせします。');
        }
      });
    });

    function timerFinished() {
      timerState.textContent = 'DONE!';
      startBtn.textContent = 'スタート';
      timerRunning = false;
      setProgress(0);
      
      showBackgroundNotification('昼寝タイマー終了', 'すっきりと目覚められましたか？記録を保存しましょう！');
      playAlarmAndVibrate();
      showCompletionModal();
    }

    function resetTimer() {
      clearInterval(timerInterval);
      stopAlarmAndVibrate();
      hideCompletionModal();
      secondsLeft = totalSeconds;
      timerRunning = false;
      timerState.textContent = 'READY';
      startBtn.textContent = 'スタート';
      updateTimerDisplay();
    }

    // Presets
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        totalSeconds = parseInt(btn.dataset.time);
        resetTimer();
      });
    });

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);

    // Star Rating (Orange/Gold Apple Style)
    const stars = document.querySelectorAll('#rating-stars .star');
    stars.forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.value);
        stars.forEach(s => {
          if (parseInt(s.dataset.value) <= selectedRating) {
            s.classList.add('selected');
          } else {
            s.classList.remove('selected');
          }
        });
      });
    });

    // LocalStorage CRUD logs
    const logsContainer = document.getElementById('log-list-container');
    const napForm = document.getElementById('nap-form');
    let locationChart = null;
    let ratingChart = null;

    function getLogs() {
      return JSON.parse(localStorage.getItem('nap_logs') || '[]');
    }

    function saveLogs(logs) {
      localStorage.setItem('nap_logs', JSON.stringify(logs));
    }

    function renderLogs() {
      const logs = getLogs();
      logsContainer.innerHTML = '';
      
      if (logs.length === 0) {
        logsContainer.innerHTML = `<div style="text-align: center; color: var(--body-muted); padding: 24px;">記録された昼寝ログはありません。</div>`;
        return;
      }

      logs.forEach((log, index) => {
        const item = document.createElement('div');
        item.className = 'log-item';
        
        const starsHtml = '★'.repeat(log.rating) + '☆'.repeat(5 - log.rating);
        const dateStr = new Date(log.date).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        item.innerHTML = `
          <div class="log-info">
            <h4>${log.duration}分間の睡眠 (${log.locationName})</h4>
            <p>${dateStr} | すっきり度: <span style="color: #ff9500">${starsHtml}</span></p>
            ${log.notes ? `<p style="margin-top: 4px; font-style: italic; color: var(--body-muted);">"${log.notes}"</p>` : ''}
          </div>
          <div class="log-meta">
            <button class="delete-link" onclick="deleteLog(${index})">削除</button>
          </div>
        `;
        logsContainer.appendChild(item);
      });
    }

    window.deleteLog = function(index) {
      if (confirm('この記録を削除しますか？')) {
        const logs = getLogs();
        logs.splice(index, 1);
        saveLogs(logs);
        renderLogs();
        initCharts();
      }
    };

    napForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const duration = parseInt(document.getElementById('nap-duration').value);
      const location = document.getElementById('nap-location').value;
      const locationSelect = document.getElementById('nap-location');
      const locationName = locationSelect.options[locationSelect.selectedIndex].text;
      const notes = document.getElementById('nap-notes').value;

      const newLog = {
        date: new Date().toISOString(),
        duration,
        location,
        locationName,
        rating: selectedRating,
        notes
      };

      const logs = getLogs();
      logs.unshift(newLog);
      saveLogs(logs);
      
      // Reset form
      document.getElementById('nap-notes').value = '';
      renderLogs();
      initCharts();
      
      alert('昼寝記録を保存しました。');
    });

    // Tab switcher
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
        
        if (btn.dataset.tab === 'tab-charts') {
          initCharts();
        }
      });
    });

    // Chart.js Visualization (Clean Apple Colors)
    function initCharts() {
      const logs = getLogs();
      if (logs.length === 0) return;

      const locations = {};
      logs.forEach(log => {
        locations[log.locationName] = (locations[log.locationName] || 0) + 1;
      });

      const recentLogs = [...logs].reverse().slice(-7);
      const ratingLabels = recentLogs.map(log => new Date(log.date).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }));
      const ratingData = recentLogs.map(log => log.rating);

      // Location Chart (Doughnut)
      if (locationChart) locationChart.destroy();
      const ctxLoc = document.getElementById('locationChart').getContext('2d');
      locationChart = new Chart(ctxLoc, {
        type: 'doughnut',
        data: {
          labels: Object.keys(locations),
          datasets: [{
            data: Object.values(locations),
            backgroundColor: [
              '#0066cc', // Action Blue
              '#5ac8fa', // Teal/Sky Blue
              '#ff9500', // Gold
              '#4cd964', // Green
              '#ff2d55'  // Pink/Red
            ],
            borderWidth: 1,
            borderColor: '#ffffff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: '#86868b',
                font: { family: 'Inter', size: 11 }
              }
            }
          }
        }
      });

      // Rating Chart (Line)
      if (ratingChart) ratingChart.destroy();
      const ctxRate = document.getElementById('ratingChart').getContext('2d');
      ratingChart = new Chart(ctxRate, {
        type: 'line',
        data: {
          labels: ratingLabels,
          datasets: [{
            label: 'すっきり度',
            data: ratingData,
            borderColor: '#0066cc',
            backgroundColor: 'rgba(0, 102, 204, 0.04)',
            borderWidth: 2,
            tension: 0.2,
            fill: true,
            pointBackgroundColor: '#0066cc',
            pointRadius: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              min: 1,
              max: 5,
              grid: { color: '#e5e5e7' },
              ticks: { color: '#86868b', stepSize: 1, font: { family: 'Inter', size: 11 } }
            },
            x: {
              grid: { display: false },
              ticks: { color: '#86868b', font: { family: 'Inter', size: 11 } }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    resetTimer();
    renderLogs();
    initStatusPanel();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then((reg) => console.log('Nap App Service Worker registered successfully:', reg.scope))
          .catch((err) => console.error('Nap App Service Worker registration failed:', err));
      });
    }
  </script>
  <!-- Timer Completion Custom Modal -->
  <div id="completion-modal" class="modal-backdrop">
    <div class="modal-card" style="width: 340px; padding: 24px 20px;">
      <span class="modal-emoji" style="margin-bottom: 8px;">💤</span>
      <h3 style="font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 4px;">お疲れ様でした！</h3>
      <p style="font-size: 13px; color: var(--body-muted); margin-bottom: 16px;">昼寝タイマーが終了しました。</p>
      
      <!-- Seamless Record Form -->
      <div style="text-align: left; background-color: var(--canvas-parchment); border-radius: var(--rounded-md); padding: 16px; margin-bottom: 20px; border: 1px solid var(--hairline-soft);">
        <div class="form-group" style="margin-bottom: 12px;">
          <label style="font-size: 11px; margin-bottom: 4px;">すっきり度</label>
          <div class="rating-container" id="modal-rating-stars">
            <span class="star selected" data-value="1">★</span>
            <span class="star selected" data-value="2">★</span>
            <span class="star selected" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 12px;">
          <label for="modal-nap-location" style="font-size: 11px; margin-bottom: 4px;">場所</label>
          <select id="modal-nap-location" style="padding: 8px 12px; font-size: 13px;">
            <option value="bed">ベッド</option>
            <option value="sofa">ソファ</option>
            <option value="desk" selected>デスク・机</option>
            <option value="floor">床・コタツ</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="modal-nap-notes" style="font-size: 11px; margin-bottom: 4px;">メモ</label>
          <input type="text" id="modal-nap-notes" placeholder="（例：すっきり起きられた）" style="padding: 8px 12px; font-size: 13px;">
        </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <button id="modal-save-btn" class="btn btn-primary" style="width: 100%; padding: 12px;">記録を保存する</button>
        <button id="modal-close-btn" class="btn btn-secondary" style="width: 100%; padding: 10px; font-size: 13px; border-color: transparent; background-color: transparent;">記録せずに閉じる</button>
      </div>
    </div>
  </div>
</body>
</html>
