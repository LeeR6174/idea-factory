<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="睡眠メモ">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <title>睡眠振り返りメモアプリ</title>
  <style>
    /* Apple Design System Guidelines Implementation */
    :root {
      --bg-color: #f5f5f7;
      --card-bg: #ffffff;
      --accent-color: #0066cc;
      --accent-light: #e6f0fa;
      --text-main: #1d1d1f;
      --text-secondary: #86868b;
      --border-color: #e5e5e7;
      --good-color: #34c759;
      --good-bg: #eafaf1;
      --bad-color: #ff3b30;
      --bad-bg: #ffebeb;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-family);
      line-height: 1.5;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* App Container */
    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 24px 16px 48px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    header {
      padding: 16px 8px 8px 8px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .brand svg {
      color: var(--accent-color);
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--text-main);
    }

    header p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Cards */
    .card {
      background-color: var(--card-bg);
      border-radius: 18px;
      border: 1px solid var(--border-color);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    /* Form Fields */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .badge-good {
      background-color: var(--good-bg);
      color: var(--good-color);
    }

    .badge-bad {
      background-color: var(--bad-bg);
      color: var(--bad-color);
    }

    textarea {
      width: 100%;
      height: 84px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: #fafafa;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-main);
      resize: none;
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent-color);
      background-color: var(--card-bg);
    }

    textarea::placeholder {
      color: #b0b0b5;
      font-size: 14px;
    }

    /* Button and validation warning styles */
    .error-banner {
      background-color: var(--bad-bg);
      border: 1px solid rgba(255, 59, 48, 0.2);
      color: var(--bad-color);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .btn-submit {
      width: 100%;
      height: 50px;
      border-radius: 9999px;
      border: none;
      background-color: var(--accent-color);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:active {
      opacity: 0.8;
    }

    /* Quick Suggestion Chips */
    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .chip {
      background-color: #f2f2f7;
      color: #48484a;
      border: none;
      border-radius: 9999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .chip:active {
      background-color: #e5e5ea;
    }

    /* Statistics Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-main);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Memo List Section */
    .history-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
    }

    .section-header h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Search & Filter Header */
    .search-wrapper {
      position: relative;
      margin-bottom: 4px;
    }

    .search-input {
      width: 100%;
      height: 38px;
      padding: 8px 12px 8px 36px;
      border-radius: 9999px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent-color);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
    }

    /* History Items */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .item-date {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 28px;
      height: 28px;
    }

    .delete-btn:hover {
      background-color: #f2f2f7;
      color: var(--bad-color);
    }

    .item-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-memo-block {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.55;
    }

    .item-memo-block.good {
      background-color: var(--good-bg);
      border-left: 3px solid var(--good-color);
    }

    .item-memo-block.bad {
      background-color: var(--bad-bg);
      border-left: 3px solid var(--bad-color);
    }

    .item-memo-label {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .item-memo-label.good {
      color: var(--good-color);
    }

    .item-memo-label.bad {
      color: var(--bad-color);
    }

    .item-memo-text {
      color: var(--text-main);
      white-space: pre-wrap;
    }

    /* Empty state */
    .empty-state {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-secondary);
      background-color: var(--card-bg);
      border-radius: 18px;
      border: 1px dotted var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .empty-state svg {
      color: #d1d1d6;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background-color: rgba(0, 0, 0, 0.85);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      box-shadow: none;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- App Header -->
    <header>
      <div class="brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12.3 22c5.523 0 10-4.477 10-10a9.924 9.924 0 0 0-1.843-5.719c-.382-.55-.992-.729-1.48-.372a8.001 8.001 0 0 1-11.834-8.878c.094-.6-.283-1.127-.866-1.127H6C3.239 1.053 1 3.292 1 6.053c0 9.07 7.07 15.947 11.3 15.947Z" />
        </svg>
        <h1>睡眠振り返り</h1>
      </div>
      <p>よかったこと・わるかったことを1分でメモ</p>
    </header>

    <!-- Error Banner (Custom validation show area) -->
    <div id="error-banner" class="error-banner">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>「よかったこと」か「わるかったこと」のどちらか一方を入力してください。</span>
    </div>

    <!-- Record Section Card -->
    <form id="recordForm" class="card" onsubmit="saveMemo(event)">
      <div class="card-title">今日の睡眠を振り返る</div>

      <!-- Good Memo Field -->
      <div class="form-group">
        <label class="form-label" for="goodMemo">
          <span class="badge-icon badge-good">👍</span>
          よかったこと
        </label>
        <textarea id="goodMemo" placeholder="例：すんなり快眠できた、途中で起きなかった、寝る前にスマホを見なかった" aria-label="よかったこと"></textarea>
        <div class="chips-container">
          <button type="button" class="chip" onclick="applySuggestion('goodMemo', '朝すっきり起きられた')">朝すっきり起きられた</button>
          <button type="button" class="chip" onclick="applySuggestion('goodMemo', '途中で起きなかった')">途中で起きなかった</button>
          <button type="button" class="chip" onclick="applySuggestion('goodMemo', '寝る前のスマホを我慢できた')">スマホを我慢できた</button>
        </div>
      </div>

      <!-- Bad Memo Field -->
      <div class="form-group">
        <label class="form-label" for="badMemo">
          <span class="badge-icon badge-bad">👎</span>
          わるかったこと
        </label>
        <textarea id="badMemo" placeholder="例：夜中に何度も起きた、寝る直前までスマホを見た、コーヒーを遅くに飲んだ" aria-label="わるかったこと"></textarea>
        <div class="chips-container">
          <button type="button" class="chip" onclick="applySuggestion('badMemo', '夜中に目が覚めた')">夜中に目が覚めた</button>
          <button type="button" class="chip" onclick="applySuggestion('badMemo', '寝る前のスマホが長かった')">寝る前のスマホ</button>
          <button type="button" class="chip" onclick="applySuggestion('badMemo', '寝る時間が遅くなった')">夜更かししてしまった</button>
        </div>
      </div>

      <!-- Save Button -->
      <button type="submit" class="btn-submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        記録を保存する
      </button>
    </form>

    <!-- Stat Dashboard -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">総記録数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-good">0</div>
        <div class="stat-label">快眠メモ数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-bad">0</div>
        <div class="stat-label">改善メモ数</div>
      </div>
    </div>

    <!-- History Header with Search -->
    <div class="history-section">
      <div class="section-header">
        <h2>過去の振り返り</h2>
      </div>

      <!-- Search Input -->
      <div class="search-wrapper">
        <span class="search-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードで検索..." oninput="renderHistory()">
      </div>

      <!-- Main History List Render Area -->
      <div id="historyList" class="history-list"></div>
    </div>

  </div>

  <!-- Universal Toast Notifier -->
  <div id="toast" class="toast">記録されました</div>

  <script>
    // In-memory data repository reading/writing to localStorage
    const STORAGE_KEY = 'sleep_reflection_memos_v1';
    let memos = [];

    // Initialize application
    document.addEventListener('DOMContentLoaded', () => {
      loadMemos();
      renderHistory();
      
      // Register PWA Service Worker for offline use
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('SW Registered: ', reg.scope))
            .catch(err => console.error('SW Error: ', err));
        });
      }
    });

    // Helper: suggestions applicator
    function applySuggestion(elementId, text) {
      const textarea = document.getElementById(elementId);
      if (textarea.value.trim() !== "") {
        textarea.value += "、" + text;
      } else {
        textarea.value = text;
      }
      // Automagic hide error warning on typing/input modification
      hideError();
    }

    // Hide error banner styling
    function hideError() {
      document.getElementById('error-banner').style.display = 'none';
    }

    // Listener to clean error message instantly when user interacts with textareas manually
    document.getElementById('goodMemo').addEventListener('input', hideError);
    document.getElementById('badMemo').addEventListener('input', hideError);

    // Save and register a new sleep comment memo entry
    function saveMemo(event) {
      event.preventDefault();

      const goodMemo = document.getElementById('goodMemo').value.trim();
      const badMemo = document.getElementById('badMemo').value.trim();

      // Rule: Both fields cannot be empty
      if (!goodMemo && !badMemo) {
        showError();
        return;
      }

      // Automatically construct UUID and current accurate ISO system date
      const memoId = 'memo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      const currentTimeString = new Date().toISOString();

      const newMemo = {
        id: memoId,
        recordedAt: currentTimeString,
        goodMemo: goodMemo,
        badMemo: badMemo
      };

      memos.unshift(newMemo); // Add to beginning of local array
      saveToStorage();
      
      // Reset inputs & update statistics/render UI
      document.getElementById('recordForm').reset();
      renderHistory();
      showToast('記録を保存しました。');
    }

    function showError() {
      const banner = document.getElementById('error-banner');
      banner.style.display = 'flex';
      // Smoothly scroll error banner into perspective on small mobiles
      banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Dynamic toast alerts
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Persistent storage functions
    function loadMemos() {
      const rawData = localStorage.getItem(STORAGE_KEY);
      if (rawData) {
        try {
          memos = JSON.parse(rawData);
          // Sorting elements: safely ensure latest chronological recordedAt matches indices first
          memos.sort((a, b) => new Date(b.recordedAt) - new Date(a.recordedAt));
        } catch (e) {
          console.error("Failed to parse LocalStorage data", e);
          memos = [];
        }
      }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(memos));
    }

    // UI render of history blocks & statistics calculation
    function renderHistory() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const container = document.getElementById('historyList');
      container.innerHTML = '';

      // Calculate state metrics
      const totalCount = memos.length;
      let goodCount = 0;
      let badCount = 0;

      memos.forEach(m => {
        if (m.goodMemo) goodCount++;
        if (m.badMemo) badCount++;
      });

      // Update HUD metrics immediately
      document.getElementById('stat-total').textContent = totalCount;
      document.getElementById('stat-good').textContent = goodCount;
      document.getElementById('stat-bad').textContent = badCount;

      // Filter local list items matching search query
      const filteredMemos = memos.filter(m => {
        const matchesGood = m.goodMemo && m.goodMemo.toLowerCase().includes(query);
        const matchesBad = m.badMemo && m.badMemo.toLowerCase().includes(query);
        const matchesDate = m.recordedAt && formatDate(m.recordedAt).toLowerCase().includes(query);
        return !query || matchesGood || matchesBad || matchesDate;
      });

      if (filteredMemos.length === 0) {
        const searchPlaceholderText = query ? '検索条件に一致する記録がありません。' : 'まだ睡眠の振り返り記録がありません。<br>上のフォームから今日の睡眠についてのコメントを記録してみましょう！';
        container.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2Zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8Z"></path>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p>${searchPlaceholderText}</p>
          </div>
        `;
        return;
      }

      filteredMemos.forEach(memo => {
        const itemElement = document.createElement('div');
        itemElement.className = 'history-item';

        const dateStr = formatDate(memo.recordedAt);

        let contentHtml = '';
        if (memo.goodMemo) {
          contentHtml += `
            <div class="item-memo-block good">
              <div class="item-memo-label good">よかったこと</div>
              <div class="item-memo-text">${escapeHtml(memo.goodMemo)}</div>
            </div>
          `;
        }
        if (memo.badMemo) {
          contentHtml += `
            <div class="item-memo-block bad">
              <div class="item-memo-label bad">わるかったこと</div>
              <div class="item-memo-text">${escapeHtml(memo.badMemo)}</div>
            </div>
          `;
        }

        itemElement.innerHTML = `
          <div class="item-header">
            <span class="item-date">${dateStr}</span>
            <button class="delete-btn" aria-label="削除" onclick="deleteMemo('${memo.id}')">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
          <div class="item-content">
            ${contentHtml}
          </div>
        `;
        container.appendChild(itemElement);
      });
    }

    // Delete feedback confirmation handler
    function deleteMemo(id) {
      if (confirm('この記録を削除してもよろしいですか？')) {
        memos = memos.filter(m => m.id !== id);
        saveToStorage();
        renderHistory();
        showToast('記録を削除しました。');
      }
    }

    // Utility: highly aesthetic Japanese timestamp generator
    function formatDate(isoString) {
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return isoString;

      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const weeks = ['日', '月', '火', '水', '木', '金', '土'];
      const weekName = weeks[date.getDay()];

      return `${year}年${month}月${day}日 (${weekName}) ${hours}:${minutes}`;
    }

    // HTML sanitizer payload injection defense
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
