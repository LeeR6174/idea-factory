<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Factory - Dashboard</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.07);
      --card-hover-bg: rgba(255, 255, 255, 0.06);
      --card-hover-border: rgba(99, 102, 241, 0.4);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --secondary: #ec4899;
      --accent: #a855f7;
      --gradient-primary: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      --glow-shadow: 0 0 25px rgba(99, 102, 241, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    .bg-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      filter: blur(80px);
      pointer-events: none;
    }

    .bg-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      filter: blur(100px);
      pointer-events: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      position: relative;
    }

    /* Header Section */
    header {
      text-align: center;
      margin-bottom: 4rem;
      position: relative;
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      padding: 0.5rem 1.2rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      backdrop-filter: blur(10px);
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background-color: var(--secondary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--secondary);
      animation: pulse 2s infinite;
    }

    .logo-text {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -1px;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Stats Panel */
    .stats-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      text-align: center;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
    }

    .stat-num {
      font-family: 'Outfit', sans-serif;
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Section Header */
    .section-title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1rem;
    }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 24px;
      background: var(--gradient-primary);
      border-radius: 2px;
    }

    .action-btn {
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      background: var(--gradient-primary);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--glow-shadow);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    /* Grid Layout for App Cards */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .app-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .app-card:hover {
      transform: translateY(-8px);
      background: var(--card-hover-bg);
      border-color: var(--card-hover-border);
      box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15);
    }

    .app-card:hover::before {
      opacity: 1;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .app-id {
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      padding: 0.2rem 0.6rem;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 6px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .app-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .app-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      line-height: 1.4;
      color: white;
    }

    .app-description {
      font-size: 0.925rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
      flex-grow: 1;
    }

    .app-footer {
      margin-top: auto;
    }

    .launch-btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .launch-btn:hover {
      background: white;
      color: var(--bg-color);
      border-color: white;
      box-shadow: 0 4px 15px rgba(255,255,255,0.1);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      background: var(--card-bg);
      border: 1px dashed var(--card-border);
      border-radius: 20px;
      color: var(--text-muted);
    }

    /* Keyframes */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px var(--secondary); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animated-entrance {
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      h1 { font-size: 2.5rem; }
      .container { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="container animated-entrance">
    
    <!-- Header -->
    <header>
      <div class="logo-container">
        <div class="logo-dot"></div>
        <span class="logo-text">Idea Factory</span>
      </div>
      <h1>アイデア・ファクトリー</h1>
      <p class="subtitle">GitHub Issues に欲しいアプリのアイデアを投稿するだけで、AIエージェントが自律的に開発し、このダッシュボードに自動的に追加します。</p>
    </header>

    <!-- Stats -->
    <section class="stats-panel">
      <div class="stat-card">
        <div class="stat-num" id="stat-count">0</div>
        <div class="stat-label">デプロイ済みアプリ数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-last-update">-</div>
        <div class="stat-label">最終アップデート</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">Netlify</div>
        <div class="stat-label">デプロイ環境</div>
      </div>
    </section>

    <!-- App Listing -->
    <section>
      <div class="section-title-bar">
        <h2 class="section-title">生成されたアプリケーション</h2>
        <a href="https://github.com/LeeR6174/idea-factory/issues/new" target="_blank" class="action-btn">
          <span>+ アイデアを投稿する</span>
        </a>
      </div>

      <div class="app-grid" id="app-grid">
        <!-- Dynamically Loaded Cards -->
        <div class="empty-state">
          アプリ一覧を読み込んでいます...
        </div>
      </div>
    </section>

  </div>

  <script>
    // Fetch apps from registry
    async function loadApps() {
      const grid = document.getElementById('app-grid');
      const statCount = document.getElementById('stat-count');
      const statLastUpdate = document.getElementById('stat-last-update');
      
      try {
        const response = await fetch('apps.json');
        if (!response.ok) throw new Error('apps.json could not be loaded');
        const apps = await response.ok ? await response.json() : [];
        
        statCount.textContent = apps.length;
        
        if (apps.length > 0) {
          // Find latest date
          const dates = apps.map(app => new Date(app.date));
          const maxDate = new Date(Math.max.apply(null, dates));
          statLastUpdate.textContent = maxDate.toISOString().split('T')[0];
          
          grid.innerHTML = '';
          apps.forEach((app, index) => {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.style.animationDelay = `${index * 0.1}s`;
            
            // Build the card HTML
            card.innerHTML = `
              <div class="app-header">
                <span class="app-id">#${app.id}</span>
                <span class="app-date">${app.date}</span>
              </div>
              <h3 class="app-title">${app.title}</h3>
              <p class="app-description">${app.description}</p>
              <div class="app-footer">
                <a href="${app.path}/index.html" class="launch-btn" target="_blank">
                  <span>アプリを起動する</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
              </div>
            `;
            grid.appendChild(card);
          });
        } else {
          showEmptyState(grid);
        }
      } catch (error) {
        console.error(error);
        showEmptyState(grid, "アプリ情報のロード中にエラーが発生しました。");
      }
    }

    function showEmptyState(element, message = "まだアプリが生成されていません。上のボタンからGitHub Issueを作成してください。") {
      element.innerHTML = `
        <div class="empty-state">
          <p>${message}</p>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', loadApps);
  </script>
</body>
</html>
